version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - copyloopvar
    - gosec
    - misspell
    - noctx
    - prealloc
    - unconvert
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G104 # Audit errors not checked (we use errcheck linter)
        - G115 # Integer overflow conversion (safe bounded conversions for network protocols)
        - G101 # false positives on config patterns (API endpoint URLs / default option maps)
        - G118 # Goroutine uses context.Background while request-scoped context available (intentional background work)
        - G122 # filepath.Walk symlink TOCTOU (paths are server-controlled cache dirs)
        - G124 # http.Cookie security attributes (set conditionally based on TLS config)
        - G602 # slice bounds (runtime checks, bounded by protocol)
        - G705 # XSS via taint analysis (embedded static assets, not user input)
      config:
        global:
          # Remaining exclusions are handled via inline //nolint:gosec comments:
          # G103: unsafe calls (needed for low-level device/network code)
          # G107: URL in http.Get (needed for proxy operations)
          # G204: command injection (needed for VPN setup commands)
          # G301/G302/G304/G306: file/dir permissions (appropriate for config handling)
          # G401/G402/G407/G505: weak crypto (legacy compatibility, self-signed certs)
          nosec: false
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    staticcheck:
      # Match golangci-lint v1 behavior: run SA* and gosimple S* checks only.
      # QF* (quickfix) and ST* (stylecheck) checks were not enabled under v1.
      checks:
        - all
        - -QF*
        - -ST*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - noctx
          - prealloc
        path: _test\.go
      - linters:
          - gochecknoglobals
        path: internal/version/version\.go
      # noctx in v2 added os/exec.* and net.* "must not be called" checks not
      # present under v1 (v1 only flagged missing context on HTTP requests).
      # Preserve the original ruleset: keep HTTP-context checks, drop the new
      # exec/net listener/dialer/resolver checks.
      - linters:
          - noctx
        text: (os/exec|net)\.[A-Za-z]+ must not be called
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rennerdo30/bifrost-proxy
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
